<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASTRA FIGHT CLUB | Gallery</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0b0b0b;
            color:white;
        }

        header{
            background:black;
            padding:20px;
            text-align:center;
            border-bottom:2px solid #ff3333;
        }

        header h1{
            color:#ff3333;
            letter-spacing:2px;
        }

        .back-btn{
    display:inline-block;
    margin-top:40px;
    background:#ff3333;
    color:white;
    padding:14px 30px;
    border-radius:6px;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
}

.back-btn:hover{
    background:#cc0000;
    transform:scale(1.05);
}
        
        .gallery-container{
            max-width:1200px;
            margin:auto;
            padding:50px 20px;
        }

        .gallery-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }
        .event-title{
    color:#ff3333;
    margin-bottom:25px;
    margin-top:40px;
    text-align:center;
    font-size:2rem;
    letter-spacing:2px;
}

.gallery-item{
    text-align:center;
}

.gallery-item p{
    margin-top:10px;
    color:#ff3333;
    font-weight:bold;
}
        .gallery-grid img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
            transition:0.3s;
            border:2px solid #1a1a1a;
        }

        .gallery-grid img:hover{
            transform:scale(1.05);
            border-color:#ff3333;
        }

        .back-btn{
            display:inline-block;
            margin-top:40px;
            background:#ff3333;
            padding:12px 25px;
            border-radius:6px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        .back-btn:hover{
            background:#cc0000;
        }
    </style>
</head>
<body>

<header>
    <h1>ASTRA FIGHT CLUB GALLERY</h1>
</header>

<section class="gallery-container">
    <a href="index.html" class="back-btn">← Back Home</a>
<section class="gallery-container">

    <h2 class="event-title">INAUGURATION </h2>

    <div class="gallery-grid">

        <div class="gallery-item">
            <img src="images/boxing1.jpg" alt="Boxing Seminar">
            <p>Heavy Bag Training</p>
        </div>

        <div class="gallery-item">
            <img src="images/boxing2.jpg" alt="Boxing Seminar">
            <p>Sparring Session</p>
        </div>

        <div class="gallery-item">
            <img src="images/boxing3.jpg" alt="Boxing Seminar">
            <p>Coach Demonstration</p>
        </div>

    </div>
    

</section>


<section class="gallery-container">

    <h2 class="event-title">ACHIEVEMENT</h2>

    <div class="gallery-grid">

        <div class="gallery-item">
            <img src="images/muaythai1.jpg" alt="Muay Thai Camp">
            <p>Pad Work</p>
        </div>

        <div class="gallery-item">
            <img src="images/muaythai2.jpg" alt="Muay Thai Camp">
            <p>Clinch Training</p>
        </div>

        <div class="gallery-item">
            <img src="images/muaythai3.jpg" alt="Muay Thai Camp">
            <p>Fight Conditioning</p>
        </div>

    </div>

</section>

</body>
</html>
